<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Client Forms</title>

<style>
/* Body and full-screen setup */
body {
    font-family: Arial, Helvetica, sans-serif;
    background: #ffffff;   /* white background */
    text-align: center;
    margin: 0;
    padding: 0;
    min-height: 100vh;     /* full viewport height */
}

/* Logo styling */
.logo {
    margin-top: 40px;
}

.logo img {
    max-width: 350px;  /* adjust size if needed */
    height: auto;
    display: block;
    margin: 0 auto;
}

/* Page header */
h1 {
    margin-top: 20px;
    font-size: 34px;
    color: #333;
}

/* Container for buttons */
.container {
    margin-top: 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    min-height: calc(100vh - 250px); /* leaves space for logo & header */
    justify-content: center;         /* vertically center buttons */
}

/* Form buttons */
.formbtn {
    width: 85%;
    max-width: 520px;
    padding: 32px;
    font-size: 30px;
    border-radius: 16px;
    border: none;
    background: #000000;
    color: white;
    box-shadow: 0 6px 10px rgba(0,0,0,0.2);
}

.formbtn:active {
    background: #333333;
    transform: scale(.98);
}

/* Reset button */
.reset {
    margin-top: 60px;
    font-size: 18px;
    background: #e3e3e3;
    padding: 12px 25px;
    border-radius: 10px;
    border: none;
}

/* Footer text */
.footer {
    margin-top: 40px;
    font-size: 14px;
    color: #888;
}
</style>

</head>
<body>

<!-- Logo -->
<div class="logo">
    <img src="https://ibb.co/VW6wT2mx">
</div>

<h1>Select Your Form</h1>

<!-- Form buttons -->
<div class="container">
    <button class="formbtn" onclick="location.href='https://pdf.ac/VyJTAHskuh'">
        Client Info Form
    </button>

    <button class="formbtn" onclick="location.href='https://pdf.ac/69Y-3czA9'">
        Single Engagement Form
    </button>

    <button class="formbtn" onclick="location.href='https://pdf.ac/dpLYwo3Pp'">
        Married Engagement Form
    </button>
</div>

<!-- Reset button -->
<button class="reset" onclick="location.reload()">
    Reset Screen
</button>

<div class="footer">
Please let our staff know when you are finished
</div>

</body>
</html>
